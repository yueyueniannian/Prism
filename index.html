<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ContraSci - 文献反向求证助手</title>
  <style>
    /* ===== Splash Screen ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 40%, rgba(18, 108, 133, 0.18), transparent 50%),
        linear-gradient(180deg, #fbfcff 0%, #f0f3f8 50%, #e4e9f2 100%);
      transition: opacity 0.55s ease, visibility 0.55s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      width: 90px;
      height: 90px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      color: #fff;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #126c85, #bd352b);
      box-shadow:
        0 22px 48px rgba(189, 53, 43, 0.32),
        inset 0 0 0 1px rgba(255, 255, 255, 0.4);
      animation: splashPulse 2.2s ease-in-out infinite;
      position: relative;
    }

    @keyframes splashPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 22px 48px rgba(189, 53, 43, 0.32), inset 0 0 0 1px rgba(255, 255, 255, 0.4); }
      50% { transform: scale(1.06); box-shadow: 0 28px 58px rgba(189, 53, 43, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.5); }
    }

    .splash-ring {
      position: absolute;
      inset: -10px;
      border-radius: 28px;
      border: 2.5px solid transparent;
      border-top-color: rgba(189, 53, 43, 0.45);
      border-right-color: rgba(18, 108, 133, 0.38);
      animation: spin 1.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .splash-title {
      margin-top: 28px;
      font-size: 1.4rem;
      font-weight: 780;
      color: #182033;
      letter-spacing: 0.5px;
    }

    .splash-sub {
      margin-top: 6px;
      color: #6a7284;
      font-size: 0.88rem;
      letter-spacing: 0.3px;
    }

    .splash-bar {
      margin-top: 32px;
      width: 180px;
      height: 4px;
      background: #dfe4ed;
      border-radius: 999px;
      overflow: hidden;
    }

    .splash-bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #126c85, #bd352b);
      animation: fillBar 2s ease-out forwards;
    }

    @keyframes fillBar {
      0% { width: 0; }
      60% { width: 72%; }
      100% { width: 100%; }
    }

    /* ===== Main Styles ===== */
    :root {
      --bg: #f6f7fb;
      --ink: #182033;
      --muted: #6a7284;
      --line: #dfe4ed;
      --support: #126c85;
      --support-soft: #e5f5f7;
      --support-line: #7ac8d6;
      --rebut: #bd352b;
      --rebut-soft: #fff0ed;
      --rebut-line: #f19586;
      --warn: #f5a524;
      --paper: #ffffff;
      --shadow: 0 18px 42px rgba(24, 32, 51, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(18, 108, 133, 0.12), transparent 32rem),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 42%, #eef2f7 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1500px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(172px, 220px) 1fr minmax(118px, auto);
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(223, 228, 237, 0.9);
      box-shadow: 0 10px 28px rgba(24, 32, 51, 0.07);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      position: sticky;
      top: 12px;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(135deg, #126c85, #bd352b);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.04rem;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      display: block;
      font-size: 0.74rem;
      margin-top: 4px;
      white-space: nowrap;
    }

    .query-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      min-width: 0;
    }

    .query-input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 0 14px;
      outline: none;
      color: var(--ink);
      box-shadow: inset 0 1px 2px rgba(24, 32, 51, 0.04);
    }

    .query-input:focus {
      border-color: #126c85;
      box-shadow: 0 0 0 3px rgba(18, 108, 133, 0.14);
    }

    .primary-btn,
    .ghost-btn,
    .icon-btn {
      border: 0;
      border-radius: 8px;
      height: 46px;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      background: #bd352b;
      min-width: 124px;
      padding: 0 18px;
      font-weight: 760;
      box-shadow: 0 12px 24px rgba(189, 53, 43, 0.22);
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:active,
    .ghost-btn:active,
    .icon-btn:active {
      transform: translateY(0);
    }

    .primary-btn:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .ghost-btn {
      color: var(--ink);
      background: #f0f3f8;
      border: 1px solid var(--line);
      padding: 0 14px;
      min-width: 112px;
    }

    .icon-btn {
      width: 46px;
      background: #f0f3f8;
      border: 1px solid var(--line);
      color: var(--ink);
      position: relative;
    }

    .icon-btn::after {
      content: attr(aria-label);
      position: absolute;
      right: 0;
      bottom: -34px;
      background: #182033;
      color: #fff;
      font-size: 0.72rem;
      padding: 5px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .icon-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .sample-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 2px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .sample-row::-webkit-scrollbar {
      display: none;
    }

    .sample-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #3b4355;
      height: 34px;
      border-radius: 999px;
      padding: 0 12px;
      white-space: nowrap;
      box-shadow: 0 7px 18px rgba(24, 32, 51, 0.05);
    }

    .sample-btn:hover {
      border-color: #126c85;
      color: #126c85;
    }

    .status-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) repeat(3, minmax(160px, 0.42fr));
      gap: 12px;
      margin: 12px 0;
    }

    .status-panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(24, 32, 51, 0.06);
      padding: 14px;
      min-height: 92px;
    }

    .status-panel .label {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 8px;
    }

    .hypothesis-text {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.45;
      font-weight: 740;
    }

    .metric {
      display: flex;
      align-items: end;
      gap: 6px;
      margin-top: 3px;
    }

    .metric strong {
      font-size: 1.92rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .metric span {
      color: var(--muted);
      margin-bottom: 4px;
      font-size: 0.82rem;
    }

    .meter {
      height: 7px;
      background: #edf0f5;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    .meter i {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #126c85, #f5a524, #bd352b);
      transition: width 500ms ease;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .chip {
      border: 1px solid #d9dde7;
      background: #f7f9fc;
      color: #4f5769;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.75rem;
      line-height: 1;
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(150px, 0.24fr) minmax(320px, 1fr);
      gap: 14px;
      align-items: stretch;
      margin-top: 12px;
      min-height: 640px;
    }

    .lane {
      position: relative;
      z-index: 2;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .lane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 13px;
      border-bottom: 1px solid var(--line);
    }

    .lane-header h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .lane-header span {
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .support-lane .lane-header {
      background: linear-gradient(180deg, var(--support-soft), rgba(255, 255, 255, 0.78));
      color: #0d5366;
    }

    .rebut-lane .lane-header {
      background: linear-gradient(180deg, var(--rebut-soft), rgba(255, 255, 255, 0.78));
      color: #9f2d26;
    }

    .paper-list {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .paper-card {
      border: 1px solid #e1e6ef;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 8px 20px rgba(24, 32, 51, 0.045);
      overflow: hidden;
    }

    .paper-top {
      padding: 13px 14px 10px;
      border-bottom: 1px solid #eef1f6;
      display: grid;
      gap: 8px;
    }

    .paper-title {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.35;
      font-weight: 780;
    }

    .paper-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      line-height: 1;
      border: 1px solid transparent;
      font-weight: 700;
      font-size: 0.72rem;
    }

    .support-badge {
      color: #0d5366;
      background: var(--support-soft);
      border-color: var(--support-line);
    }

    .rebut-badge {
      color: #9f2d26;
      background: var(--rebut-soft);
      border-color: var(--rebut-line);
    }

    .field-list {
      display: grid;
      gap: 1px;
      background: #eef1f6;
    }

    .field {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: start;
      background: #fff;
      padding: 10px 12px;
      min-height: 54px;
      border-left: 3px solid transparent;
    }

    .field b {
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      line-height: 1.35;
    }

    .field span {
      font-size: 0.88rem;
      line-height: 1.42;
      color: #273044;
    }

    .field.active {
      background: #fffaf3;
      border-left-color: var(--warn);
    }

    .support-lane .field.active {
      box-shadow: inset 4px 0 0 rgba(18, 108, 133, 0.18);
    }

    .rebut-lane .field.active {
      box-shadow: inset -4px 0 0 rgba(189, 53, 43, 0.18);
    }

    .conflict-spine {
      position: relative;
      z-index: 3;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(24, 32, 51, 0.07);
      padding: 13px 10px;
      min-width: 0;
    }

    .spine-title {
      margin: 0 0 10px;
      color: #3b4355;
      font-size: 0.82rem;
      font-weight: 800;
      text-align: center;
    }

    .conflict-tabs {
      display: grid;
      gap: 8px;
    }

    .conflict-tab {
      width: 100%;
      border: 1px solid #e5dae0;
      background: #fff;
      color: #3b4355;
      border-radius: 8px;
      padding: 10px 9px;
      text-align: left;
      min-height: 58px;
      box-shadow: 0 6px 16px rgba(24, 32, 51, 0.04);
    }

    .conflict-tab strong {
      display: block;
      font-size: 0.8rem;
      color: #9f2d26;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .conflict-tab span {
      display: block;
      font-size: 0.72rem;
      line-height: 1.32;
      color: var(--muted);
    }

    .conflict-tab.active {
      border-color: #bd352b;
      background: #fff4f2;
      box-shadow: 0 10px 22px rgba(189, 53, 43, 0.11);
    }

    .verdict {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      color: #3b4355;
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .lines-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: visible;
    }

    .lines-layer path {
      fill: none;
      stroke: rgba(189, 53, 43, 0.75);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-dasharray: 8 7;
      filter: drop-shadow(0 2px 2px rgba(189, 53, 43, 0.18));
      animation: dash 1.2s linear infinite;
    }

    .lines-layer circle {
      fill: #fff;
      stroke: #bd352b;
      stroke-width: 2;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -15;
      }
    }

    .line-label {
      position: absolute;
      z-index: 5;
      transform: translate(-50%, -50%);
      width: min(168px, 15vw);
      min-width: 126px;
      border: 1px solid #f0b1a8;
      background: #fff7f5;
      color: #8f2822;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(189, 53, 43, 0.16);
      padding: 8px 9px;
      font-size: 0.74rem;
      line-height: 1.35;
      text-align: center;
      pointer-events: none;
    }

    .line-label b {
      display: block;
      color: #bd352b;
      margin-bottom: 3px;
    }

    .empty-state {
      grid-column: 1 / -1;
      border: 1px dashed #cfd6e2;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      min-height: 460px;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state strong {
      display: block;
      font-size: 1.12rem;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .loader {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 4px;
      align-items: center;
    }

    .loader i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.45;
      animation: blink 900ms infinite ease-in-out;
    }

    .loader i:nth-child(2) {
      animation-delay: 120ms;
    }

    .loader i:nth-child(3) {
      animation-delay: 240ms;
    }

    @keyframes blink {
      50% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    @media (max-width: 1100px) {
      .app {
        width: min(100vw - 24px, 980px);
      }

      .topbar {
        grid-template-columns: 1fr;
        position: static;
      }

      .toolbar-actions {
        justify-content: start;
      }

      .status-grid {
        grid-template-columns: 1fr 1fr;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .conflict-spine {
        order: -1;
      }

      .lines-layer,
      .line-label {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100vw - 16px, 560px);
        padding-top: 10px;
      }

      .query-form {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        width: 100%;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .lane-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .field {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .paper-list {
        padding: 10px;
      }
    }
  </style>
</head>

      const stems = [

        "failed replication",
        "negative trial",
        "heterogeneity",
        "conflicting evidence"

      if (!clean) {
        input.focus();
        return;
      }

      setLoading(true);
      $("#hypothesisText").textContent = clean;
      $("#riskScore").textContent = "--";
      $("#hitCount").textContent = "--";
      $("#conflictCount").textContent = "--";
      $("#riskMeter").style.width = "0";
      $("#keywordChips").innerHTML = "";
      $("#dimensionChips").innerHTML = "";

      try {
        const result = await mockBackendSearch(clean);
        state.result = result;
        state.activeConflict = 0;
        updateStatus(result);
        renderBoard();
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      runVerification(input.value);
    });

    $("#randomBtn").addEventListener("click", () => {
      const next = sampleHypotheses[randomInt(0, sampleHypotheses.length - 1)];
      input.value = next;
      runVerification(next);
    });

    $("#resetBtn").addEventListener("click", () => {
      input.value = "";
      state.result = null;
      state.activeConflict = 0;
      $("#hypothesisText").textContent = "等待输入科研假设";
      $("#riskScore").textContent = "--";
      $("#hitCount").textContent = "--";
      $("#conflictCount").textContent = "--";
      $("#riskMeter").style.width = "0";
      $("#keywordChips").innerHTML = "";
      $("#dimensionChips").innerHTML = "";
      board.innerHTML = `
        <svg class="lines-layer" id="linesLayer" aria-hidden="true"></svg>
        <div class="empty-state" id="emptyState">
          <div>
            <strong>输入假设后开始反向求证</strong>
            <span>Demo 会生成逆向检索词，并用 mock 文献库抽取相互冲突的实验参数。</span>
          </div>
        </div>
      `;
      input.focus();
    });

    document.querySelectorAll(".sample-btn").forEach((button) => {
      button.addEventListener("click", () => {
        input.value = button.textContent.trim();
        runVerification(input.value);
      });
    });

    window.addEventListener("resize", () => requestAnimationFrame(drawLines));

    runVerification(input.value);
  </script>
</body>
</html>
