<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Map Lab</title>
  <link rel="stylesheet" href="./research-map.css">
</head>
<body>
  <div class="map-shell">
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <header class="map-hero">
      <div class="map-copy">
        <p class="eyebrow">Research Navigation</p>
        <h1>Research Map Lab</h1>
        <p class="hero-text">
          输入研究方向关键词，查看该方向内的代表论文图谱。每篇论文会显示
          <span>灌水风险</span>、
          <span>开源状态</span>、
          <span>复现难度</span> 和
          <span>工作定位</span>，
          论文之间通过相关边连接。
        </p>
      </div>

      <div class="hero-side">
        <a class="nav-link-btn" href="./index.html">返回审稿页</a>
        <div class="side-card">
          <p class="side-label">图谱模式</p>
          <p class="side-value">本地研究样本库 + 关键词匹配</p>
        </div>
      </div>
    </header>

    <main class="map-workspace">
      <section class="search-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Search</p>
            <h2>研究方向搜索</h2>
          </div>
          <p class="panel-copy">支持示例：`多模态大模型`、`RAG`、`扩散模型`、`图神经网络`、`推理模型`。</p>
        </div>

        <div class="search-row">
          <input id="keywordInput" class="search-input" type="text" placeholder="输入研究方向关键词，例如：RAG、多模态大模型、扩散模型">
          <button id="searchBtn" class="primary-btn">生成图谱</button>
        </div>

        <div class="quick-row" id="quickTags"></div>
      </section>

      <section class="graph-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Graph</p>
            <h2 id="graphTitle">等待搜索</h2>
          </div>
          <p id="graphMeta" class="panel-copy">输入关键词后，这里会显示论文关系图。</p>
        </div>

        <div class="graph-stage" id="graphStage">
          <svg id="edgeLayer" class="edge-layer" viewBox="0 0 1200 720" preserveAspectRatio="none"></svg>
          <div id="nodeLayer" class="node-layer"></div>
        </div>
      </section>

      <section class="summary-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Summary</p>
            <h2>相关研究方向推荐</h2>
          </div>
          <p class="panel-copy">根据当前关键词，汇总相邻方向、推荐度和简要解析。</p>
        </div>

        <div class="direction-grid" id="directionGrid">
          <article class="direction-card placeholder-card">
            <p>搜索后显示推荐方向。</p>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="./research-map.js"></script>
</body>
</html>
